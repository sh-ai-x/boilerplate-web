name: PR Review

# Auto-run /dev-kit:review (3-dim) and /dev-kit:security (10-dim OWASP) on every
# PR, in parallel. dev-kit plugin is installed from this checkout via a
# local marketplace symlink so the namespaced skills resolve.
#
# Severity gate + auto-approve (per claude-review-plugins spec):
#   Approve            (no critical, no major in BOTH review + security) → success + auto-approve
#   Changes Requested  (any major in either)                              → failure
#   Blocked            (any critical in either)                           → failure
#
# Empty-verdict gate (0.1.3+): missing verdict defaults to Approve with
# ::warning:: in BOTH pull_request and workflow_dispatch modes. The
# human gate (REVIEW_REQUIRED / CHANGES_REQUESTED) is what blocks merge.
#
# Why `pull_request` (not `pull_request_target`):
#   `anthropics/claude-code-action@v1` does an OIDC token exchange by
#   default. With `pull_request_target` the exchanged token is rejected
#   with 401 Invalid OIDC token in any consumer repo that does not have
#   OIDC trust configured at the org/repo level. `pull_request` issues
#   a token the action's federation endpoint accepts, so the agent runs
#   and posts a verdict.
#
#   Trade-off: on `pull_request`, the action's workflow-validation gate
#   skips runs when the workflow file itself is modified on the PR head.
#   The first PR that ADDS `.github/workflows/review.yml` is the obvious
#   example; the verdict comes back empty, the severity gate defaults to
#   Approve + ::warning::, and the human review state is what actually
#   blocks merge. Normal PRs (not touching the workflow file) get a real
#   agent review.
#
#   The dev-harness-kit repo's own review.yml has always used
#   `pull_request` for this reason. The consumer template previously
#   used `pull_request_target` to attempt reviews on workflow-modifying
#   PRs, at the cost of breaking consumer repos without OIDC trust.
#
# Fork safety: `pull_request` runs in PR-head context (untrusted code
# from forks), but fork PRs still receive NO repo secrets (only
# GITHUB_TOKEN). The fork-safety guard
#   github.event.pull_request.head.repo.full_name == github.repository
# skips fork PRs BEFORE any step executes. workflow_dispatch is exempt
# (manual operator action).
#
# Secret name `MINIMAX_API_KEY` is preserved from prior workflow — do not
# rename (would break existing repo secret config).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      review_provider:
        description: "Provider for this run (default: minimax)"
        required: false
        default: "minimax"
        type: choice
        options:
          - minimax
          - anthropic
      pr_number:
        description: "PR number to review"
        required: false
        type: string

# Cancel superseded re-runs on the same PR (e.g. force-push mid-review).
# workflow_dispatch runs are independent and use a separate group.
concurrency:
  group: review-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  review:
    # Fork-safety guard: skip silently for fork PRs (fork PRs have no
    # access to MINIMAX_API_KEY / DEV_KIT_GITHUB_TOKEN, so we don't even
    # run the install step on them). workflow_dispatch is exempt -- the
    # operator is trusted.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    name: /dev-kit:review (3-dim)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      verdict: ${{ steps.extract_verdict.outputs.verdict }}
      agent_ran: ${{ steps.extract_verdict.outputs.agent_ran }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      MINIMAX_BASE_URL: https://api.minimax.io/anthropic
      # Used by the consumer-install branch of the install step below when
      # the dev-harness-kit source is private. Optional for self-install.
      DEV_KIT_GITHUB_TOKEN: ${{ secrets.DEV_KIT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout PR head sha. With `pull_request`, the action defaults
          # to the PR head ref, but we pin the explicit sha so the agent
          # reads the exact files in the diff.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Install dev-kit plugin
        run: |
          mkdir -p ~/.claude/plugins/marketplaces
          # Self-aware install: if the checkout IS the dev-kit plugin
          # (has the manifest + required skills), symlink it.
          # Otherwise (consumer repo via ci-setup), clone the source.
          # When the source is private, the consumer must provision a
          # fine-grained PAT with contents:read on sh-ai-x/dev-harness-kit
          # as a repo secret named DEV_KIT_GITHUB_TOKEN.
          if [ -f "$GITHUB_WORKSPACE/.claude-plugin/plugin.json" ] \
             && [ -d "$GITHUB_WORKSPACE/skills/review" ] \
             && [ -d "$GITHUB_WORKSPACE/skills/security" ]; then
            ln -sfn "$GITHUB_WORKSPACE" ~/.claude/plugins/marketplaces/dev-kit
            echo "::notice::dev-kit self-install: symlinked $GITHUB_WORKSPACE"
          else
            if [ -z "$DEV_KIT_GITHUB_TOKEN" ]; then
              echo "::error::DEV_KIT_GITHUB_TOKEN secret is required for consumer-install."
              echo "  sh-ai-x/dev-harness-kit is private; provision a fine-grained"
              echo "  PAT with contents:read on sh-ai-x/dev-harness-kit and set it"
              echo "  as a repo secret named DEV_KIT_GITHUB_TOKEN in this repo's"
              echo "  Settings → Secrets and variables → Actions."
              exit 1
            fi
            echo "::notice::dev-kit consumer-install: cloning sh-ai-x/dev-harness-kit via DEV_KIT_GITHUB_TOKEN"
            git clone --depth 1 \
              "https://x-access-token:${DEV_KIT_GITHUB_TOKEN}@github.com/sh-ai-x/dev-harness-kit.git" \
              ~/.claude/plugins/marketplaces/dev-kit
          fi
          # Always verify the install succeeded (catches both paths).
          test -f ~/.claude/plugins/marketplaces/dev-kit/.claude-plugin/plugin.json
          test -d ~/.claude/plugins/marketplaces/dev-kit/skills/review
          test -d ~/.claude/plugins/marketplaces/dev-kit/skills/security
          echo "dev-kit plugin installed: $(readlink ~/.claude/plugins/marketplaces/dev-kit || echo 'real')"

      - name: Resolve PR + provider
        id: provider
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo variable `CI_REVIEW_PROVIDER` (set via `gh variable set CI_REVIEW_PROVIDER <value>`)
          # takes precedence over the workflow_dispatch input. Empty/missing falls through.
          CI_REVIEW_PROVIDER: ${{ vars.CI_REVIEW_PROVIDER }}
        run: |
          # Precedence: vars.CI_REVIEW_PROVIDER > github.event.inputs.review_provider > 'minimax'
          provider="${CI_REVIEW_PROVIDER:-}"
          if [ -z "$provider" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            provider="${{ github.event.inputs.review_provider }}"
          fi
          if [ -z "$provider" ]; then
            provider="minimax"
          fi
          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ -z "${{ github.event.inputs.pr_number }}" ] && { echo "::error::pr_number required"; exit 1; }
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi
          source_label="default"
          [ -n "$CI_REVIEW_PROVIDER" ] && source_label="vars.CI_REVIEW_PROVIDER"
          [ -z "$CI_REVIEW_PROVIDER" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ] && source_label="dispatch"
          echo "::notice::Provider resolved: $provider (source=$source_label)"

      - name: Run /dev-kit:review via MiniMax
        if: steps.provider.outputs.provider == 'minimax'
        # MiniMax channel: env-only (no with.anthropic_api_key to avoid mixed auth).
        env:
          ANTHROPIC_BASE_URL: ${{ env.MINIMAX_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_SONNET_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_OPUS_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_HAIKU_MODEL: 'MiniMax-M3[1m]'
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: false  # force per-line inline comments (track_progress: true suppresses them)
          prompt: |
            Load the /dev-kit:review skill from $HOME/.claude/plugins/marketplaces/dev-kit/skills/review/SKILL.md
            (use the Read tool). Follow its protocol. After analysis, post the
            Layer-2 summary as a single PR comment via:
              gh pr comment "${{ steps.provider.outputs.pr_number }}" --body "..."

            The body MUST begin with a single line of exactly one of:
              Verdict: Approve
              Verdict: Changes Requested
              Verdict: Blocked
            (Do not use the bold-wrapped form here; the gate's regex parses
            only "Verdict: <value>" so trailing prose that echoes this example
            won't accidentally satisfy the gate.)

            Render the standard two-layer output (PR summary at top, per-finding
            inline comments). The summary MUST begin with a single line exactly
            of the form:

              Verdict: Approve
              Verdict: Changes Requested
              Verdict: Blocked

            (Do not use the bold-wrapped form here; the gate's regex parses
            only "Verdict: <value>".)

            Map verdict strictly to severity (do NOT inflate):
              - 🔴 critical ≥ 1          → Verdict: Blocked
              - 🟠 major  ≥ 1, 🔴 = 0    → Verdict: Changes Requested
              - no 🔴, no 🟠             → Verdict: Approve
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Run /dev-kit:review via Claude Code opt-in
        if: steps.provider.outputs.provider == 'anthropic'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: false  # force per-line inline comments (track_progress: true suppresses them)
          prompt: |
            Load the /dev-kit:review skill from $HOME/.claude/plugins/marketplaces/dev-kit/skills/review/SKILL.md
            (use the Read tool). Follow its protocol. After analysis, post the
            Layer-2 summary as a single PR comment via:
              gh pr comment "${{ steps.provider.outputs.pr_number }}" --body "..."

            The body MUST begin with a single line of exactly one of:
              Verdict: Approve
              Verdict: Changes Requested
              Verdict: Blocked
            (Do not use the bold-wrapped form here; the gate's regex parses
            only "Verdict: <value>" so trailing prose that echoes this example
            won't accidentally satisfy the gate.)

            Render the standard two-layer output. The summary MUST begin
            with a single line exactly of the form:

              Verdict: Approve
              Verdict: Changes Requested
              Verdict: Blocked

            (Do not use the bold-wrapped form here; the gate's regex parses
            only "Verdict: <value>".)
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Detect bootstrap-PR fallback
        id: fallback
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          # NO `set -uo pipefail` — the prior version triggered pipefail on
          # any pipe-stage failure, which crashed the step even when the
          # rest of the bash was correct. We use plain `set -u` for
          # unbound-variable safety only.
          set -u
          if [ "${event_name:-}" = "workflow_dispatch" ]; then
            echo "needs_fallback=false (workflow_dispatch)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # anthropics/claude-code-action@v1 skips when the PR head's
          # .github/workflows/*.yml differs from the default branch.
          # We grep WITHOUT the `^` anchor and strip CR, because
          # `gh pr diff --name-only` can prefix lines with whitespace in
          # some shells/configurations, which would defeat the anchor.
          workflow_files=$(gh pr diff "$PR_NUMBER" --name-only 2>/dev/null \
            | tr -d '\r' \
            | grep -E '\.github/workflows/.+\.ya?ml$' \
            || true)
          if [ -n "$workflow_files" ]; then
            listed=$(echo "$workflow_files" | paste -sd, -)
            echo "::notice::PR modifies workflow files (${listed}); claude-code-action will skip."
            echo "needs_fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post fallback verdict comment (review)
        if: steps.fallback.outputs.needs_fallback == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "Verdict: Approve"
            echo
            echo "LLM review (3-dim) skipped -- workflow validation guard"
            echo
            echo 'anthropics/claude-code-action@v1 refused to run because this PR modifies one or more files under .github/workflows/. The action enforces identical content with the default branch as a self-protection guard.'
            echo
            echo "Action required: manual review of the workflow changes by a maintainer before merge."
          } | gh pr comment "$PR_NUMBER" --body-file -

      - name: Extract review verdict
        id: extract_verdict
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          # NO `set -uo pipefail`. We DO want the script to survive any
          # pipe failure (gh api rate limit, missing file, etc.) and
          # still set the outputs. `set -u` is omitted too — we use
          # defensive defaults ("${var:-}") everywhere instead.
          if [ "${{ steps.fallback.outputs.needs_fallback }}" = "true" ]; then
            echo "review_verdict=Approve (fallback: PR modifies workflow files)"
            echo "verdict=Approve" >> "$GITHUB_OUTPUT"
            echo "agent_ran=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # ROOT-CAUSE FIX: prefer the agent's actual output file over
          # PR-comment grep. The file lives at:
          #   $RUNNER_TEMP/claude-execution-output.json  (canonical)
          #   /home/runner/work/_temp/claude-execution-output.json  (older)
          # We try both. If the file is missing OR the parser returns no
          # verdict OR the file looks like HTML/empty, fall back to the
          # comment-grep below.
          AGENT_OUTPUT="${{ runner.temp }}/claude-execution-output.json"
          if [ ! -f "$AGENT_OUTPUT" ]; then
            AGENT_OUTPUT="/home/runner/work/_temp/claude-execution-output.json"
          fi
          file_verdict=""
          if [ -f "$AGENT_OUTPUT" ]; then
            file_verdict="$(python3 "${{ github.workspace }}/scripts/extract-verdict.py" "$AGENT_OUTPUT" 2>/dev/null || echo '')"
          fi

          if [ -n "$file_verdict" ]; then
            verdict="$file_verdict"
            verdict_source="agent-output-file"
            agent_ran="true"
          else
            # ROOT-CAUSE FIX: when the agent's output file is missing or
            # extract-verdict.py returns nothing, default to Approve + warning
            # instead of grepping PR comments for a stale verdict. The
            # previous comment-grep fallback could resurrect a "Verdict:
            # Changes Requested" from an earlier run and re-introduce gate
            # flapping — the severity gate's "default to Approve on empty"
            # branch never fired because the fallback ensured verdict was
            # non-empty. Matches the gate's existing contract: empty
            # verdict is valid; the human gate (REVIEW_REQUIRED /
            # CHANGES_REQUESTED on the PR) is what actually blocks merge.
            #
            # agent_ran: only set false when the action explicitly refused
            # to run (the bootstrap-PR remediation case at
            # needs_fallback=true already short-circuits above; if we got
            # here without a fallback, the action silently skipped). For
            # job-timeout (cancelled) or genuine failure, the agent DID
            # run — just didn't finish in time or hit a runtime error.
            # Set agent_ran=true so the gate's hard-fail-on-skip rule
            # doesn't fire on transient backend issues; the gate's
            # failure-result hard-fail rule (line 718) will still catch
            # actual job failures.
            if [ -f "$AGENT_OUTPUT" ]; then
              echo "::warning::review verdict missing (agent_ran=true, file=${AGENT_OUTPUT} produced no parseable verdict); defaulting to Approve"
              verdict="Approve"
              verdict_source="default-approve-empty-file"
              agent_ran="true"
            else
              # No agent output file. Distinguish:
              #   - job.status == "cancelled" → agent ran but timed out
              #   - job.status == "failure"   → agent ran but errored
              #   - job.status == "success"   → bootstrap-PR / action refused
              # The first two are transient; set agent_ran=true so the
              # gate's hard-fail-on-skip rule doesn't fire. The third
              # means the action never started (agent_ran=false is
              # correct; gate's hard-fail fires as designed).
              case "${{ job.status }}" in
                cancelled|failure)
                  echo "::warning::review verdict missing (job.status=${{ job.status }}; agent ran but didn't finish; output file not written); defaulting to Approve"
                  verdict="Approve"
                  verdict_source="default-approve-job-${{ job.status }}"
                  agent_ran="true"
                  ;;
                *)
                  # success (or unset — shouldn't happen since the
                  # needs_fallback branch above already short-circuits
                  # the bootstrap-PR case). Default to Approve + warning
                  # with agent_ran=false so the gate's hard-fail-on-skip
                  # rule fires if this somehow reaches it.
                  echo "::warning::review verdict missing (no agent output file at ${AGENT_OUTPUT}; job.status=${{ job.status }}); defaulting to Approve"
                  verdict="Approve"
                  verdict_source="default-approve-no-file"
                  agent_ran="false"
                  ;;
              esac
            fi
          fi
          # ALWAYS set the outputs (don't exit early). Empty verdict is
          # valid; the gate handles it (default to Approve + warning).
          echo "review_verdict=${verdict:-}  source=${verdict_source}  agent_ran=${agent_ran}"
          echo "verdict=${verdict:-}" >> "$GITHUB_OUTPUT"
          echo "agent_ran=${agent_ran}" >> "$GITHUB_OUTPUT"

  security:
    # See review-job comment above; same fork-safety contract.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    name: /dev-kit:security (10-dim OWASP)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      verdict: ${{ steps.extract_verdict.outputs.verdict }}
      agent_ran: ${{ steps.extract_verdict.outputs.agent_ran }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      MINIMAX_BASE_URL: https://api.minimax.io/anthropic
      DEV_KIT_GITHUB_TOKEN: ${{ secrets.DEV_KIT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout PR head sha. With `pull_request`, the action defaults
          # to the PR head ref, but we pin the explicit sha so the agent
          # reads the exact files in the diff.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Install dev-kit plugin
        run: |
          mkdir -p ~/.claude/plugins/marketplaces
          # Self-aware install: if the checkout IS the dev-kit plugin
          # (has the manifest + required skills), symlink it.
          # Otherwise (consumer repo via ci-setup), clone the source.
          # When the source is private, the consumer must provision a
          # fine-grained PAT with contents:read on sh-ai-x/dev-harness-kit
          # as a repo secret named DEV_KIT_GITHUB_TOKEN.
          if [ -f "$GITHUB_WORKSPACE/.claude-plugin/plugin.json" ] \
             && [ -d "$GITHUB_WORKSPACE/skills/review" ] \
             && [ -d "$GITHUB_WORKSPACE/skills/security" ]; then
            ln -sfn "$GITHUB_WORKSPACE" ~/.claude/plugins/marketplaces/dev-kit
            echo "::notice::dev-kit self-install: symlinked $GITHUB_WORKSPACE"
          else
            if [ -z "$DEV_KIT_GITHUB_TOKEN" ]; then
              echo "::error::DEV_KIT_GITHUB_TOKEN secret is required for consumer-install."
              echo "  sh-ai-x/dev-harness-kit is private; provision a fine-grained"
              echo "  PAT with contents:read on sh-ai-x/dev-harness-kit and set it"
              echo "  as a repo secret named DEV_KIT_GITHUB_TOKEN in this repo's"
              echo "  Settings → Secrets and variables → Actions."
              exit 1
            fi
            echo "::notice::dev-kit consumer-install: cloning sh-ai-x/dev-harness-kit via DEV_KIT_GITHUB_TOKEN"
            git clone --depth 1 \
              "https://x-access-token:${DEV_KIT_GITHUB_TOKEN}@github.com/sh-ai-x/dev-harness-kit.git" \
              ~/.claude/plugins/marketplaces/dev-kit
          fi
          # Always verify the install succeeded (catches both paths).
          test -f ~/.claude/plugins/marketplaces/dev-kit/.claude-plugin/plugin.json
          test -d ~/.claude/plugins/marketplaces/dev-kit/skills/review
          test -d ~/.claude/plugins/marketplaces/dev-kit/skills/security
          echo "dev-kit plugin installed: $(readlink ~/.claude/plugins/marketplaces/dev-kit || echo 'real')"

      - name: Resolve PR + provider
        id: provider
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo variable `CI_REVIEW_PROVIDER` (set via `gh variable set CI_REVIEW_PROVIDER <value>`)
          # takes precedence over the workflow_dispatch input. Empty/missing falls through.
          CI_REVIEW_PROVIDER: ${{ vars.CI_REVIEW_PROVIDER }}
        run: |
          # Precedence: vars.CI_REVIEW_PROVIDER > github.event.inputs.review_provider > 'minimax'
          provider="${CI_REVIEW_PROVIDER:-}"
          if [ -z "$provider" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            provider="${{ github.event.inputs.review_provider }}"
          fi
          if [ -z "$provider" ]; then
            provider="minimax"
          fi
          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ -z "${{ github.event.inputs.pr_number }}" ] && { echo "::error::pr_number required"; exit 1; }
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi
          source_label="default"
          [ -n "$CI_REVIEW_PROVIDER" ] && source_label="vars.CI_REVIEW_PROVIDER"
          [ -z "$CI_REVIEW_PROVIDER" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ] && source_label="dispatch"
          echo "::notice::Provider resolved: $provider (source=$source_label)"

      - name: Run /dev-kit:security via MiniMax
        if: steps.provider.outputs.provider == 'minimax'
        env:
          ANTHROPIC_BASE_URL: ${{ env.MINIMAX_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_SONNET_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_OPUS_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_HAIKU_MODEL: 'MiniMax-M3[1m]'
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: false  # force per-line inline comments (track_progress: true suppresses them)
          prompt: |
            Load the /dev-kit:security skill from $HOME/.claude/plugins/marketplaces/dev-kit/skills/security/SKILL.md
            (use the Read tool). Follow its protocol. After analysis, post the
            security summary as a single PR comment via:
              gh pr comment "${{ steps.provider.outputs.pr_number }}" --body "..."

            The body MUST begin with a single line of exactly one of:
              Verdict: Approve
              Verdict: Changes Requested
              Verdict: Blocked
            (Do not use the bold-wrapped form here; the gate's regex parses
            only "Verdict: <value>" so trailing prose that echoes this example
            won't accidentally satisfy the gate.)

            Render the security summary (per-category breakdown table + Verdict).
            The summary MUST begin with a single line exactly of the form:

              Verdict: Approve
              Verdict: Changes Requested
              Verdict: Blocked

            (Do not use the bold-wrapped form here; the gate's regex parses
            only "Verdict: <value>".)

            Map verdict per spec:
              - 🔴 critical ≥ 1          → Verdict: Blocked
              - 🟠 major  ≥ 1, 🔴 = 0    → Verdict: Changes Requested
              - no 🔴, no 🟠             → Verdict: Approve
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Run /dev-kit:security via Claude Code opt-in
        if: steps.provider.outputs.provider == 'anthropic'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: false  # force per-line inline comments (track_progress: true suppresses them)
          prompt: |
            Load the /dev-kit:security skill from $HOME/.claude/plugins/marketplaces/dev-kit/skills/security/SKILL.md
            (use the Read tool). Follow its protocol. After analysis, post the
            security summary as a single PR comment via:
              gh pr comment "${{ steps.provider.outputs.pr_number }}" --body "..."

            The body MUST begin with a single line of exactly one of:
              Verdict: Approve
              Verdict: Changes Requested
              Verdict: Blocked
            (Do not use the bold-wrapped form here; the gate's regex parses
            only "Verdict: <value>" so trailing prose that echoes this example
            won't accidentally satisfy the gate.)

            Render the security summary. The summary MUST begin with a single
            line exactly of the form:

              Verdict: Approve
              Verdict: Changes Requested
              Verdict: Blocked

            (Do not use the bold-wrapped form here; the gate's regex parses
            only "Verdict: <value>".)
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Detect bootstrap-PR fallback
        id: fallback
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          # NO `set -uo pipefail` — the prior version triggered pipefail on
          # any pipe-stage failure, which crashed the step even when the
          # rest of the bash was correct. We use plain `set -u` for
          # unbound-variable safety only.
          set -u
          if [ "${event_name:-}" = "workflow_dispatch" ]; then
            echo "needs_fallback=false (workflow_dispatch)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # anthropics/claude-code-action@v1 skips when the PR head's
          # .github/workflows/*.yml differs from the default branch.
          # We grep WITHOUT the `^` anchor and strip CR, because
          # `gh pr diff --name-only` can prefix lines with whitespace in
          # some shells/configurations, which would defeat the anchor.
          workflow_files=$(gh pr diff "$PR_NUMBER" --name-only 2>/dev/null \
            | tr -d '\r' \
            | grep -E '\.github/workflows/.+\.ya?ml$' \
            || true)
          if [ -n "$workflow_files" ]; then
            listed=$(echo "$workflow_files" | paste -sd, -)
            echo "::notice::PR modifies workflow files (${listed}); claude-code-action will skip."
            echo "needs_fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post fallback verdict comment (security)
        if: steps.fallback.outputs.needs_fallback == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "Verdict: Approve"
            echo
            echo "LLM security (10-dim OWASP) skipped -- workflow validation guard"
            echo
            echo 'anthropics/claude-code-action@v1 refused to run because this PR modifies one or more files under .github/workflows/. The action enforces identical content with the default branch as a self-protection guard.'
            echo
            echo "Action required: manual review of the workflow changes by a maintainer before merge."
          } | gh pr comment "$PR_NUMBER" --body-file -

      - name: Extract security verdict
        id: extract_verdict
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          set -uo pipefail
          if [ "${{ steps.fallback.outputs.needs_fallback }}" = "true" ]; then
            echo "security_verdict=Approve (fallback: PR modifies workflow files)"
            echo "verdict=Approve" >> "$GITHUB_OUTPUT"
            # Issue #219 Bug 2: same defect as the review extract step —
            # report agent_ran=false so the severity gate can hard-fail
            # with the bootstrap-PR remediation message.
            echo "agent_ran=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # ROOT-CAUSE FIX (issue: gate flapped between Approve/Changes
          # Requested because the previous post-script grepped PR comments
          # for "Verdict: <value>"; that worked ONLY when the agent posted
          # an explicit comment, which the model did inconsistently).
          #
          # Now: try to read the agent's actual output file
          # (anthropics/claude-code-action@v1 saves the full conversation
          # there). The file is JSON-lines; we extract the LAST
          # "Verdict: <value>" from the assistant messages. This is
          # authoritative because it comes from the agent itself, not from
          # an earlier run's stale comment.
          #
          # Fallback: if the file is missing/empty/parse-error, default
          # to Approve + warning. The previous comment-grep fallback
          # resurrected stale verdicts and re-introduced gate flapping
          # (boilerplate-web PR #18 repro, dev-harness-kit #244) — never
          # grep PR comments for a verdict.
          AGENT_OUTPUT="${{ runner.temp }}/claude-execution-output.json"
          # Some action versions write the file to a slightly different
          # path; check both.
          if [ ! -f "$AGENT_OUTPUT" ]; then
            AGENT_OUTPUT="/home/runner/work/_temp/claude-execution-output.json"
          fi
          file_verdict=""
          if [ -f "$AGENT_OUTPUT" ]; then
            file_verdict="$(python3 "${{ github.workspace }}/scripts/extract-verdict.py" "$AGENT_OUTPUT" 2>/dev/null || true)"
          fi
          if [ -n "$file_verdict" ]; then
            verdict="$file_verdict"
            verdict_source="agent-output-file"
          else
            # Same root-cause fix as the review job above: default to
            # Approve + warning on empty verdict, never grep PR comments
            # (the comment-grep fallback resurrected stale verdicts and
            # re-introduced gate flapping on the boilerplate-web PR #18
            # repro). agent_ran mirrors the same job.status check so the
            # gate's hard-fail-on-skip rule doesn't fire on transient
            # cancelled/failure outcomes.
            if [ -f "$AGENT_OUTPUT" ]; then
              echo "::warning::security verdict missing (agent_ran=true, file=${AGENT_OUTPUT} produced no parseable verdict); defaulting to Approve"
              verdict="Approve"
              verdict_source="default-approve-empty-file"
              agent_ran="true"
            else
              case "${{ job.status }}" in
                cancelled|failure)
                  echo "::warning::security verdict missing (job.status=${{ job.status }}; agent ran but didn't finish; output file not written); defaulting to Approve"
                  verdict="Approve"
                  verdict_source="default-approve-job-${{ job.status }}"
                  agent_ran="true"
                  ;;
                *)
                  echo "::warning::security verdict missing (no agent output file at ${AGENT_OUTPUT}; job.status=${{ job.status }}); defaulting to Approve"
                  verdict="Approve"
                  verdict_source="default-approve-no-file"
                  agent_ran="false"
                  ;;
              esac
            fi
          fi
          # agent_ran is now set in EVERY branch of the if/case above
          # (file_verdict success → true, file present-but-empty → true,
          # job.status=cancelled|failure → true, no-file success →
          # false for bootstrap-PR remediation). The previous
          # post-hoc comment-count detector was superseded by the
          # case-statement logic; removing it avoids an overwrite.
          echo "security_verdict=${verdict:-<none>}  source=${verdict_source}  agent_ran=${agent_ran}"
          echo "verdict=${verdict:-}" >> "$GITHUB_OUTPUT"
          echo "agent_ran=${agent_ran}" >> "$GITHUB_OUTPUT"

  gate:
    # Severity gate: same fork-safety guard. Pull from job outputs --
    # the if: always() needs to stay so the gate runs even when agents
    # were skipped, so we AND it with the fork check.
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    name: severity gate (review + security)
    runs-on: ubuntu-latest
    needs: [review, security]
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Checkout (for gh CLI git discovery)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Combined verdict gate
        run: |
          # Read verdicts directly from each job's outputs (set by the
          # 'Extract <skill> verdict' post-step in review + security jobs).
          # This is robust: no fragile comment-body matching required.
          R="${{ needs.review.outputs.verdict }}"
          S="${{ needs.security.outputs.verdict }}"
          # agent_ran: false when anthropics/claude-code-action@v1 SKIPPED
          # the run due to workflow-validation. Set by the 'Extract <skill>
          # verdict' post-step based on whether any claude-prefixed comment
          # exists on the PR. The action skips silently on PRs that touch
          # .github/workflows/* (and on bootstrap-PRs that add the file).
          R_AGENT="${{ needs.review.outputs.agent_ran }}"
          S_AGENT="${{ needs.security.outputs.agent_ran }}"
          # Job-level results: success | failure | cancelled | skipped.
          # Issue #212-C1: if the upstream agent job FAILED, the empty
          # verdict is "agent never ran" (e.g. DEV_KIT_GITHUB_TOKEN missing,
          # action rate-limit, install error), NOT "agent ran and gave
          # no severity". Distinct failure mode → distinct gate behavior:
          # hard-fail (exit 1) so the install problem surfaces instead of
          # being papered over by the Approve default.
          R_RESULT="${{ needs.review.result }}"
          S_RESULT="${{ needs.security.result }}"
          EVENT="$EVENT_NAME"
          echo "review=$R (result=$R_RESULT, agent_ran=$R_AGENT)"
          echo "security=$S (result=$S_RESULT, agent_ran=$S_AGENT)"

          # Issue #212-C1-fix: anthropics/claude-code-action@v1 exits 0 with
          # a "workflow validation skip" warning when the PR's head differs
          # from the default branch under .github/workflows/*. Result is
          # "success" (the action's exit-0 mask), but the agent never ran —
          # `agent_ran=false` is the unambiguous signal. Defaulting to
          # Approve on empty verdict in this case masked the skip as a
          # silent pass (the bootstrap-PR / PR-modifies-workflow scenario).
          # Hard-fail with a remediation message so the user knows to merge
          # the workflow change first and re-push from a clean branch.
          if [ "$R_AGENT" = "false" ] || [ "$S_AGENT" = "false" ]; then
            {
              echo "::error::review+security gate: AI agent was skipped"
              echo "  review.agent_ran=$R_AGENT verdict=$R"
              echo "  security.agent_ran=$S_AGENT verdict=$S"
              echo
              echo "  anthropics/claude-code-action@v1 refused to run on this PR."
              echo "  The action refuses any PR whose head differs from the"
              echo "  default branch under .github/workflows/*. Result is"
              echo "  success (exit-0), but no claude[bot] comment was posted"
              echo "  -- the 'Approve' verdict in the gate was the empty-verdict"
              echo "  tolerance, NOT an actual AI review."
              echo
              echo "  Fix:"
              echo "    1. Merge this PR's workflow changes to main first."
              echo "    2. Re-open or sync from the updated default branch."
              echo "    3. Future PRs (without workflow modifications) will run"
              echo "       the agent normally and post real verdicts + inline"
              echo "       comments."
            } >&2
            exit 1
          fi

          # Hard-fail gate if EITHER upstream job actually failed (not
          # skipped/cancelled). An empty verdict + failure result is the
          # canonical "install is broken" signature from issue #212.
          if [ "$R_RESULT" = "failure" ] || [ "$S_RESULT" = "failure" ]; then
            {
              echo "::error::review+security gate: upstream agent job failed"
              echo "  review.result=$R_RESULT verdict=$R"
              echo "  security.result=$S_RESULT verdict=$S"
              echo
              echo "  This means the /dev-kit:* agent never produced a verdict,"
              echo "  most often because one of:"
              echo "    - DEV_KIT_GITHUB_TOKEN secret missing or expired"
              echo "    - MINIMAX_API_KEY / ANTHROPIC_API_KEY / DEEPSEEK_API_KEY missing"
              echo "    - dev-kit plugin install failed (see 'Install dev-kit plugin' step)"
              echo "    - anthropics/claude-code-action@v1 rate-limit / transient network error"
              echo
              echo "  The severity gate does NOT default to Approve on failure"
              echo "  (that would mask install bugs -- issue #212-C1)."
            } >&2
            exit 1
          fi

          # Tolerate missing verdicts in BOTH event modes WHEN the upstream
          # job actually succeeded / was skipped (workflow-validation skip on
          # the very PR that ADDS .github/workflows/review.yml, action
          # rate-limit masked by success, transient network error). The
          # fix: default to Approve + ::warning:: so the human gate
          # (REVIEW_REQUIRED / CHANGES_REQUESTED on the PR) is what
          # actually blocks merge, not a single missing agent verdict.
          [ -z "$R" ] && { echo "::warning::review verdict missing (event=$EVENT, result=$R_RESULT); defaulting to Approve"; R="Approve"; }
          [ -z "$S" ] && { echo "::warning::security verdict missing (event=$EVENT, result=$S_RESULT); defaulting to Approve"; S="Approve"; }

          # worst-of wins
          rank() { case "$1" in Blocked) echo 2 ;; "Changes"*) echo 1 ;; Approve) echo 0 ;; *) echo 99 ;; esac; }
          r=$(rank "$R"); s=$(rank "$S")
          worst=$([ "$r" -ge "$s" ] && echo "$R" || echo "$S")
          echo "Combined worst verdict: $worst"

          # Tolerate unparseable verdicts (e.g. "Requested", "Skipped", or
          # unexpected formats from the /dev-kit:* agents): treat as non-
          # blocking by analogy with the workflow_dispatch branch above — the
          # human gate (REVIEW_REQUIRED / CHANGES_REQUESTED) is what actually
          # blocks merge, not a single regex trip.
          if ! { [ "$worst" = "Approve" ] || [ "$worst" = "Changes Requested" ] || [ "$worst" = "Blocked" ]; }; then
            echo "::warning::Unparseable verdict '$worst' (review='$R' security='$S'); treating as non-blocking."
            exit 0
          fi

          case "$worst" in
            Approve) exit 0 ;;
            "Changes"*) echo "::error::Changes Requested (review=$R security=$S)"; exit 1 ;;
            Blocked) echo "::error::Blocked (review=$R security=$S)"; exit 1 ;;
            *) echo "::error::Unparseable verdict '$worst' (review=$R security=$S)"; exit 1 ;;
          esac

      - name: Auto-approve on Approve verdict
        if: success() && github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Only auto-approve on Approve (lowest severity — no 🔴 critical,
          # no 🟠 major). Fail-open: if the API rejects (GitHub's default
          # GITHUB_TOKEN cannot approve PRs), log a warning. Set APPROVE_TOKEN
          # secret to a PAT with 'repo' scope for real auto-approval.
          R="${{ needs.review.outputs.verdict }}"
          S="${{ needs.security.outputs.verdict }}"
          rank() { case "$1" in Blocked) echo 2 ;; "Changes"*) echo 1 ;; Approve) echo 0 ;; *) echo 99 ;; esac; }
          r=$(rank "$R"); s=$(rank "$S")
          worst=$([ "$r" -ge "$s" ] && echo "$R" || echo "$S")
          if [ "$worst" = "Approve" ]; then
            echo "Verdict is Approve — attempting auto-approve."
            TOKEN="${APPROVE_TOKEN:-$GH_TOKEN}"
            gh pr review "$PR_NUMBER" --approve \
              --body "Auto-approved by /dev-kit:review + /dev-kit:security: lowest severity (no 🔴 critical, no 🟠 major)." \
              || echo "::warning::gh pr review --approve rejected. Set APPROVE_TOKEN secret to a PAT for real auto-approval; verdict itself was Approve."
          else
            echo "Verdict is '$worst' -- not auto-approving."
          fi
